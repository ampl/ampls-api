parameters:
  - name: packageName
    type: string
    default: 'solver-public-libs'
  - name: version
    type: string
    default: '*'

steps:
  - task: UniversalPackages@0
    displayName: "Download ${{ parameters.packageName }} from artifact feed"
    inputs:
      command: download
      downloadDirectory: 'libs'
      feedsToUse: internal
      vstsFeed: 'solver-libs-feed'
      vstsFeedPackage: ${{ parameters.packageName }}
      vstsPackageVersion: ${{ parameters.version }}

  - task: ExtractFiles@1
    displayName: "Unpack ${{ parameters.packageName }}"
    inputs:
      archiveFilePatterns: 'libs/*.zip'
      destinationFolder: 'libs'
      cleanDestinationFolder: false
      overwriteExistingFiles: true

  - script: |
      cd libs
      if [ -d "${{ parameters.packageName }}/${{ parameters.packageName }}" ]; then
        cp -r ${{ parameters.packageName }}/${{ parameters.packageName }}/* .
      else
        cp -r ${{ parameters.packageName }}/* .
      fi
    displayName: "Move ${{ parameters.packageName }} files to libs/"
